site_name: Foggy Notes
site_url: https://belugarex.github.io/foggy-notes/
site_description: 以图为主的开发工具组合、排错经验和可复现工作流
site_author: BelugaRex

repo_name: BelugaRex/foggy-notes
repo_url: https://github.com/BelugaRex/foggy-notes
edit_uri: ""

docs_dir: .build/docs
site_dir: .build/site

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.sections
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan

nav:
  - 首页: index.md
  - 实操指南:
      - 微软大战代码智能体指北: copilot-chat-agent-workflow.md
  - 标签索引: tags.md
  - 提出问题: https://github.com/BelugaRex/foggy-notes/issues/new

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - pymdownx.blocks.caption
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    unrecognized_links: warn

copyright: Copyright &copy; 2026 BelugaRex